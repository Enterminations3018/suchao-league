name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore suchao-wasm/SuchaoLeagueWasm.csproj

      - name: Build
        run: dotnet build suchao-wasm/SuchaoLeagueWasm.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish suchao-wasm/SuchaoLeagueWasm.csproj --configuration Release --no-build --output ./publish

      - name: Fix base href for GitHub Pages
        run: |
          cd ./publish/wwwroot
          sed -i 's|<base href="/" />|<base href="/suchao-league/" />|g' index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './publish/wwwroot'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
